
<div style="margin: 20px;">
    <Strong><h2>Reactive Form with Validation</h2></Strong>
  
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <div>
        <strong><label for="name">Name</label></strong>
        <input id="name" formControlName="name" type="text" />
        <div *ngIf="userForm.get('name')?.touched && userForm.get('name')?.invalid">
          <small *ngIf="userForm.get('name')?.hasError('required')">Name is required.</small>
          <small *ngIf="userForm.get('name')?.hasError('minlength')">Name must be at least 3 characters.</small>
        </div>
      </div>
  
      <div>
        <strong><label for="email">Email</label></strong>
        <input id="email" formControlName="email" type="email" />
        <div *ngIf="userForm.get('email')?.touched && userForm.get('email')?.invalid">
          <small *ngIf="userForm.get('email')?.hasError('required')">Email is required.</small>
          <small *ngIf="userForm.get('email')?.hasError('email')">Please enter a valid email address.</small>
        </div>
      </div>
  
      <div>
        <strong><label for="password">Password</label></strong>
        <input id="password" formControlName="password" type="password" />
        <div *ngIf="userForm.get('password')?.touched && userForm.get('password')?.invalid">
          <small *ngIf="userForm.get('password')?.hasError('required')">Password is required.</small>
          <small *ngIf="userForm.get('password')?.hasError('minlength')">Password must be at least 6 characters.</small>
          <small *ngIf="userForm.get('password')?.hasError('pattern')">Use Proper Format</small>
        </div>
      </div>
  
      <div>
        <strong><label for="confirmPassword">Confirm Password</label></strong>
        
        <input id="confirmPassword" formControlName="confirmPassword" type="password" />
        <div *ngIf="userForm.get('confirmPassword')?.touched && userForm.get('confirmPassword')?.invalid">
          <small *ngIf="userForm.get('confirmPassword')?.hasError('required')">Please confirm your password.</small>
          <small *ngIf="userForm.hasError('passwordMismatch')">Passwords do not match.</small>
        </div>
      </div>
  
      <button type="submit" [disabled]="userForm.invalid" class="btn btn-success">Submit</button>
    </form>
  </div>
