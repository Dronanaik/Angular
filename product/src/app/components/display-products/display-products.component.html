
<table class="table">
    <thead>
        <tr>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Product Price</th>
            <th>Product Description</th>
            <th>Product Image</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let product of products">
            <td>{{product.productId}}</td>
            <td>{{product.productName}}</td>
            <td>{{product.productPrice}}</td>
            <td>{{product.productDescription}}</td>
            <td>{{product.productImageUrl}}</td>
            <td><button (click)="deleteProduct(product.productId)" class="btn btn-danger"> Delete</button></td>
        </tr>
    </tbody>
</table>
